---
name: Docker automation
on:
  push:
    branches: [main]
    paths: 'application/**'

jobs:
  docker-automation-steps:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build
        run: docker build -t subin166/nodeapp:latest ./application
      - name: docker login
        uses: docker/login-action@v3
        with:
          USERNAME: ${{secrets.DOCKER_USERNAME}}
          PASSWORD: ${{secrets.DOCKER_TOKEN}}
      - name: Push images
        run: docker push subin166/nodeapp:latest
        
